services:
  engage-mcp:
    ports: []
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - ../profiles/secure-engage.env

  engage-api:
    ports: []
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - ../profiles/secure-engage.env

  nginx:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/nginx.Dockerfile
    ports:
      - "${ENGAGE_NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ${ENGAGE_NGINX_TLS_CERT:-./nginx/certs/tls.crt}:/etc/nginx/certs/tls.crt:ro
      - ${ENGAGE_NGINX_TLS_KEY:-./nginx/certs/tls.key}:/etc/nginx/certs/tls.key:ro
    depends_on:
      engage-api:
        condition: service_healthy
      engage-mcp:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

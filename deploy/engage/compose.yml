# Engage layer (offensive tooling) — opt-in; not part of default full stack.
services:
  engage-api:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/api.Dockerfile
    ports:
      - "${ENGAGE_API_PORT:-8890}:8890"
    environment:
      ENGAGE_API_LISTEN: ":8890"
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_EXECUTION_PROFILE: ${ENGAGE_EXECUTION_PROFILE:-client-native}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      ENGAGE_RUNNER_MODE: ${ENGAGE_RUNNER_MODE:-local}
      ENGAGE_JOBS_MODE: ${ENGAGE_JOBS_MODE:-file}
      ENGAGE_JOBS_DIR: ${ENGAGE_JOBS_DIR:-/var/veil/engage/jobs}
      ENGAGE_FILES_DIR: ${ENGAGE_FILES_DIR:-/tmp/engage/files}
      ENGAGE_VEIL_API_URL: ${ENGAGE_VEIL_API_URL:-http://api:8090}
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
      - engage_jobs:/var/veil/engage/jobs
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  engage-mcp:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/mcp.Dockerfile
    ports:
      - "${ENGAGE_MCP_PORT:-8892}:8892"
    environment:
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_EXECUTION_PROFILE: ${ENGAGE_EXECUTION_PROFILE:-client-native}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      ENGAGE_MCP_HTTP_ENABLED: ${ENGAGE_MCP_HTTP_ENABLED:-1}
      ENGAGE_MCP_HTTP_LISTEN: ":8892"
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
    healthcheck:
      test: ["CMD", "/mcp", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  engage-worker:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/worker.Dockerfile
    environment:
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_EXECUTION_PROFILE: ${ENGAGE_EXECUTION_PROFILE:-client-native}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      ENGAGE_JOBS_MODE: file
      ENGAGE_JOBS_DIR: /var/veil/engage/jobs
      ENGAGE_JOBS_POLL_SEC: ${ENGAGE_JOBS_POLL_SEC:-1}
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
      - engage_jobs:/var/veil/engage/jobs
    depends_on:
      engage-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/worker", "healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  engage_jobs:

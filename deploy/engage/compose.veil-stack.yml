# Overlay: engage on shared Veil NATS/Neo4j (use with scrape + pipeline + graph compose).
# Do not combine with deploy/engage/compose.events.yml (that bundle adds a standalone nats).
#
#   COMPOSE_FILES="... -f deploy/engage/compose.yml -f deploy/engage/compose.veil-stack.yml" \
#     ./scripts/ops/compose-up-veil-engage.sh
services:
  engage-api:
    ports:
      - "${ENGAGE_API_PORT:-8890}:8890"
    environment:
      ENGAGE_EVENTS_NATS_ENABLED: "1"
      ENGAGE_NATS_URL: nats://nats:4222
      ENGAGE_EVENTS_NATS_SUBJECT: engage.events.audit
      ENGAGE_VEIL_API_URL: http://api:8090
      ENGAGE_FILES_DIR: /tmp/engage/files
    depends_on:
      nats:
        condition: service_healthy
      api:
        condition: service_started

  engage-events-worker:
    build:
      context: ../..
      dockerfile: pipeline/engage-events/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      ENGAGE_EVENTS_FILTER: engage.events.>
      INGEST_SUBJECT: ingest.engage.tool_run
      INGEST_FINDING_SUBJECT: ingest.engage.finding
    depends_on:
      nats:
        condition: service_healthy
      ingest_worker:
        condition: service_started

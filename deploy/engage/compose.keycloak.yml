# Overlay: optional Keycloak + engage auth e2e (lab).
# Usage:
#   docker compose -f deploy/engage/compose.yml -f deploy/engage/compose.keycloak.yml up -d
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10

  engage-api:
    environment:
      AUTH_ENABLED: "1"
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/master
      KEYCLOAK_AUDIENCE: account
    depends_on:
      keycloak:
        condition: service_healthy

  engage-mcp:
    environment:
      AUTH_ENABLED: "1"
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/master

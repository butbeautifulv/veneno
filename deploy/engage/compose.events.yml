# Overlay: engage audit events → pipeline ingest via NATS JetStream.
services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8222/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  engage-api:
    environment:
      ENGAGE_EVENTS_NATS_ENABLED: "1"
      ENGAGE_NATS_URL: nats://nats:4222
      ENGAGE_EVENTS_NATS_SUBJECT: engage.events.audit
      ENGAGE_FILES_DIR: /tmp/engage/files
    depends_on:
      nats:
        condition: service_healthy

  engage-events-worker:
    build:
      context: ../..
      dockerfile: pipeline/engage-events/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      ENGAGE_EVENTS_FILTER: engage.events.>
      INGEST_SUBJECT: ingest.engage.tool_run
      INGEST_FINDING_SUBJECT: ingest.engage.finding
    depends_on:
      nats:
        condition: service_healthy

  # Optional: persist ingest.engage.* into Neo4j (profile graph-ingest).
  neo4j:
    profiles: [graph-ingest]
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  ingest_worker:
    profiles: [graph-ingest]
    build:
      context: ../..
      dockerfile: deploy/knowledge/docker/ingest_worker.Dockerfile
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: neo4jpassword
      NEO4J_DB: neo4j
      NATS_URL: nats://nats:4222
      NATS_INGEST_STREAM: INGEST
      NATS_SUBSCRIBE_SUBJECT: ingest.>
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started

# Overlay: NATS JetStream job queue + scalable workers.
# Usage:
#   docker compose -f deploy/engage/compose.yml -f deploy/engage/compose.nats.yml up -d nats engage-api engage-worker
services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  engage-api:
    environment:
      ENGAGE_JOBS_MODE: nats
      ENGAGE_NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy

  engage-worker:
    environment:
      ENGAGE_JOBS_MODE: nats
      ENGAGE_NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy

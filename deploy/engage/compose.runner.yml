# Lab overlay: api/worker exec tools in engage-runner via docker exec.
# Usage:
#   docker compose -f deploy/engage/compose.yml -f deploy/engage/compose.runner.yml \
#     --profile runner up -d --build engage-runner engage-api engage-worker
# Browser profile:
#   ... --profile browser up -d engage-browser
services:
  engage-runner:
    container_name: engage-runner
    build:
      context: ../..
      dockerfile: deploy/engage/docker/runner.Dockerfile
      target: engage-runner
    image: engage-runner
    network_mode: none
    profiles:
      - runner
    volumes:
      - engage_work:/tmp/engage

  engage-runner-full:
    container_name: engage-runner-full
    build:
      context: ../..
      dockerfile: deploy/engage/docker/runner.Dockerfile
      target: engage-runner-full
    image: engage-runner-full
    network_mode: none
    profiles:
      - runner-full
    volumes:
      - engage_work:/tmp/engage

  engage-api:
    build:
      dockerfile: deploy/engage/docker/api-runner.Dockerfile
    environment:
      ENGAGE_EXECUTION_PROFILE: docker-exec
      ENGAGE_RUNNER_MODE: docker
      ENGAGE_RUNNER_CONTAINER: engage-runner
      ENGAGE_CATALOG_PATH: /app/catalog/tools.live.yaml
      DISCOVERY_BROWSER_URL: ${DISCOVERY_BROWSER_URL:-http://discovery-browser:8920}
      ENGAGE_BROWSER_URL: ${ENGAGE_BROWSER_URL:-${DISCOVERY_BROWSER_URL:-http://discovery-browser:8920}}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      engage-runner:
        condition: service_started

  engage-worker:
    build:
      dockerfile: deploy/engage/docker/worker-runner.Dockerfile
    environment:
      ENGAGE_EXECUTION_PROFILE: docker-exec
      ENGAGE_RUNNER_MODE: docker
      ENGAGE_RUNNER_CONTAINER: engage-runner
      ENGAGE_CATALOG_PATH: /app/catalog/tools.live.yaml
      DISCOVERY_BROWSER_URL: ${DISCOVERY_BROWSER_URL:-http://discovery-browser:8920}
      ENGAGE_BROWSER_URL: ${ENGAGE_BROWSER_URL:-${DISCOVERY_BROWSER_URL:-http://discovery-browser:8920}}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      engage-runner:
        condition: service_started

  # Deprecated: use deploy/discovery/compose.browser.yml (discovery-browser + sidecar).
  engage-browser:
    build:
      context: ../..
      dockerfile: deploy/discovery/docker/browser-agent.Dockerfile
    ports:
      - "${ENGAGE_BROWSER_PORT:-8910}:8910"
    profiles:
      - browser

volumes:
  engage_work:

# Overlay: Redis-backed job queue + scalable workers.
# Usage:
#   docker compose -f deploy/engage/compose.yml -f deploy/engage/compose.queue.yml up -d redis engage-api engage-worker
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engage-api:
    environment:
      ENGAGE_JOBS_MODE: redis
      ENGAGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  engage-worker:
    environment:
      ENGAGE_JOBS_MODE: redis
      ENGAGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
